name: smwkp_culinary_tourism
description: "Sistem Manajemen Wisata Kuliner Palembang - Flutter application for culinary tourism management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # HTTP & Network
  http: ^1.0.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Google Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.3
  location: ^8.0.1

  # Date & Time
  intl: ^0.20.2

  # Firebase (temporarily disabled for web build to avoid interop errors)
  # firebase_core: ^2.24.0
  # firebase_auth: ^4.20.0
  # firebase_auth_web: ^5.12.0
  # cloud_firestore: ^4.13.0
  # firebase_messaging: ^14.9.4
  # firebase_messaging_web: ^3.8.7

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  image_cropper: ^12.2.1
  image_cropper_for_web: ^7.0.0

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_rating_bar: ^4.0.0
  smooth_page_indicator: ^2.0.1
  flutter_local_notifications: ^22.0.1

  # Navigation
  go_router: ^17.3.0

  # Utils
  uuid: ^4.0.0
  connectivity_plus: ^7.1.1

  # URL Launcher
  url_launcher: ^6.1.0
  firebase_messaging: ^16.3.0

  # Payment (optional)
  # flutter_stripe: ^9.0.0  # Uncomment for Stripe integration
  # razorpay_flutter: ^1.3.0  # Uncomment for Razorpay integration

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

